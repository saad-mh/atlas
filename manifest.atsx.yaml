$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://atlas-spec.dev/schemas/manifest.atsx.yaml"
title: "ATLAS manifest.atsx.yaml"
description: >
  JSON Schema for the manifest.atsx.yaml document embedded in an .atsx
  container (see README.md). Validates syntax/shape only: field names,
  types, enums, and which fields are required. It cannot check semantic
  validity such as depends_on/requires_resources/part_of/chosen_step
  referencing ids that actually exist elsewhere in the document, or that
  the process graph is acyclic - that's DAG-level validation left to a
  future `atlas validate` CLI (README §9), not this schema.

type: object
required: [atlas_version, meta, resources, process]
additionalProperties: true
properties:
  atlas_version:
    type: string
    description: "ATLAS spec version this manifest was authored against."
  meta:
    $ref: "#/$defs/meta"
  resources:
    type: array
    description: "Flat list of resources (§4). Sub-assemblies nest via part_of, not array nesting."
    items:
      $ref: "#/$defs/resource"
  process:
    type: array
    description: "Top-level process steps forming a DAG (§5)."
    items:
      $ref: "#/$defs/step"
  branches:
    type: array
    description: "Variability points (§5.3). Optional - absent means no branching."
    items:
      $ref: "#/$defs/branch"

$defs:

  slug:
    type: string
    description: "Lowercase kebab-case identifier, e.g. setup-env, m3-screws."
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"

  meta:
    type: object
    description: "Identity and authorship metadata for the build (§3)."
    required: [id, title, kind, version]
    additionalProperties: true
    properties:
      id:
        $ref: "#/$defs/slug"
        description: "Stable identifier for the build, across versions."
      title:
        type: string
      kind:
        type: string
        enum: [software, hardware, hybrid, process]
      version:
        type: string
        description: "This build's own version (semver-ish)."
      authors:
        type: array
        items:
          type: string
      license:
        type: string
      description:
        type: string
      created:
        type: string
        format: date
      updated:
        type: string
        format: date

  resource:
    type: object
    description: "A required-before/during-build dependency: part, package, tool, skill, bundled file, or sub-assembly (§4)."
    required: [id, type, name]
    additionalProperties: true
    properties:
      id:
        $ref: "#/$defs/slug"
      type:
        type: string
        enum: [hardware, software, subassembly, other]
      name:
        type: string
      quantity:
        type: number
        description: "Required (with unit) when type is hardware; omit for software/abstract resources."
      unit:
        type: string
      bundle:
        type: string
        description: "Relative path into resources/ inside the .atsx - a real file traveling with the manifest."
      source:
        type: string
        description: "Where to get it if not bundled (URL, store name, package registry)."
      required:
        type: boolean
        default: true
        description: "false = optional/nice-to-have."
      substitutes:
        type: array
        default: []
        description: "Ranked fallback list."
        items:
          type: object
          required: [name]
          additionalProperties: true
          properties:
            name:
              type: string
            note:
              type: string
      part_of:
        $ref: "#/$defs/slug"
        description: "id of a subassembly-type resource this belongs to (§4.3)."
      kind:
        type: string
        description: >
          Free-form sub-classification (e.g. environment, model_weights for
          software resources). Not enumerated in README §4.1 - left
          unconstrained pending spec clarification.
      spec_ref:
        type: string
        description: >
          Used on subassembly-type resources, e.g. "nested" (§4.3). Not
          fully specified in README - left unconstrained.
    allOf:
      - if:
          properties:
            type:
              const: hardware
          required: [type]
        then:
          properties:
            quantity:
              type: number
            unit:
              type: string
          required: [quantity, unit]

  step:
    type: object
    description: "A process step, or a group containing nested steps, forming part of the build DAG (§5)."
    required: [id, title, depends_on]
    additionalProperties: true
    properties:
      id:
        $ref: "#/$defs/slug"
      title:
        type: string
      depends_on:
        type: array
        description: "ids of steps that must be done first. Empty array if none."
        items:
          $ref: "#/$defs/slug"
        uniqueItems: true
      requires_resources:
        type: array
        description: "ids of resources this step consumes."
        items:
          $ref: "#/$defs/slug"
        uniqueItems: true
      kind:
        type: string
        enum: [task, group, checkpoint]
        default: task
      instructions:
        type: string
        description: "Free text / markdown how-to."
      attachments:
        type: array
        description: "Relative paths into attachments/."
        items:
          type: string
      verify:
        $ref: "#/$defs/verify"
      steps:
        type: array
        description: "Nested steps, meaningful when kind is group (§5)."
        items:
          $ref: "#/$defs/step"

  verify:
    type: object
    description: "Completion check for a step (§5.2)."
    required: [type]
    additionalProperties: true
    properties:
      type:
        type: string
        enum: [manual, file_exists, checksum, command]
        default: manual
        description: >
          manual: user self-marks done. file_exists: reader checks a path
          exists. checksum: reader checks a file hash matches. command:
          reader runs a shell command and checks exit code - README §7.1
          flags this as an unresolved sandboxing risk, so readers should
          treat it as opt-in and require explicit user confirmation.
          Type-specific fields (e.g. path) are intentionally unconstrained
          here pending that resolution.

  branch:
    type: object
    description: "A variability point letting one manifest represent several valid build paths (§5.3)."
    required: [id, question, options]
    additionalProperties: true
    properties:
      id:
        $ref: "#/$defs/slug"
      question:
        type: string
      options:
        type: array
        items:
          type: object
          required: [value, chosen_step]
          additionalProperties: true
          properties:
            value:
              type: string
            chosen_step:
              type: array
              description: "ids of steps activated when this option is chosen. Field name matches README §5.3 verbatim (singular name, list value)."
              items:
                $ref: "#/$defs/slug"
              uniqueItems: true
