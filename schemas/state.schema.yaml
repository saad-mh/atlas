$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://atlas-spec.dev/schemas/state.atsx.yaml"
title: "ATLAS state.atsx.yaml"
description: >
  JSON Schema for the optional state.atsx.yaml document embedded in an
  .atsx container (see README.md §6). Tracks build progress and branch
  choices separately from the manifest, so the manifest itself stays a
  clean, reusable spec. Validates syntax/shape only: field names, types,
  and enums. It cannot check that spec_id/spec_version actually match a
  given manifest.atsx.yaml, or that progress/branch_choices keys
  reference ids that exist in that manifest's process/branches - that's
  left to a future `atlas validate` CLI (README §9), not this schema.

type: object
required: [atlas_state_version, spec_id, spec_version, progress]
additionalProperties: true
properties:
  atlas_state_version:
    type: string
    description: "State schema version this document was authored against."
  spec_id:
    $ref: "#/$defs/slug"
    description: "Must match meta.id in the manifest this state tracks (§6.3)."
  spec_version:
    type: string
    description: >
      meta.version of the manifest this build started against. A
      mismatch with the manifest's current meta.version means the spec
      changed after the builder started - readers should surface this as
      a non-blocking warning, not silently ignore it (§6.3).
  instance_id:
    type: string
    description: >
      Identifies this particular builder/attempt, e.g.
      "name-local-2026-07". Lets multiple people build from the same
      manifest by keeping separate per-instance state files, e.g.
      state.<instance_id>.atsx.yaml, inside the same archive (§6.1).
  progress:
    type: object
    description: "Map of process step id -> progress entry (§6)."
    propertyNames:
      $ref: "#/$defs/slug"
    additionalProperties:
      $ref: "#/$defs/progress_entry"
  branch_choices:
    type: object
    description: >
      Map of branch id -> chosen option value. Lets a reader re-render a
      prior branch choice (§5.3) instead of re-prompting (§6).
    propertyNames:
      $ref: "#/$defs/slug"
    additionalProperties:
      type: string

$defs:

  slug:
    type: string
    description: "Lowercase kebab-case identifier, e.g. setup-env, fabrication-method."
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"

  progress_entry:
    type: object
    description: "Progress record for a single process step (§6)."
    required: [status]
    additionalProperties: true
    properties:
      status:
        type: string
        enum: [todo, in_progress, done, blocked, skipped]
      completed_at:
        type: string
        format: date-time
      notes:
        type: string
